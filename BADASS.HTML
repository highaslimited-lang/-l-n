<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    overflow:hidden;
}

/* BACKGROUND ANIMATION */
.background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    z-index:-1;
    background:linear-gradient(#87CEEB,#E0F7FF);
}

/* Landing Page Content */
.content{
    position:relative;
    z-index:10;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
}

/* Title */
.content h1{
    font-size:70px;
    text-shadow:3px 3px 10px black;
}

/* Button */
.btn{
    margin-top:20px;
    padding:15px 35px;
    font-size:22px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:#ff4444;
    color:white;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

/* Ground */
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;
    background:#42b72a;
}

/* Character */
.character{
    position:absolute;
    bottom:180px;
    left:-200px;
    width:140px;
    height:260px;
    animation:moveCharacter 12s linear infinite;
}

/* Body Bounce */
.character-inner{
    position:relative;
    animation:bounce 0.5s infinite alternate;
}

/* Head */
.head{
    position:absolute;
    width:70px;
    height:70px;
    background:#ffd6b0;
    border-radius:50%;
    left:35px;
    border:4px solid #222;
}

/* Body */
.body{
    position:absolute;
    width:80px;
    height:90px;
    background:#ff4444;
    top:70px;
    left:30px;
    border-radius:20px;
    border:4px solid #222;
}

/* Arms */
.arm{
    position:absolute;
    width:18px;
    height:80px;
    background:#ffd6b0;
    top:80px;
    border-radius:20px;
    transform-origin:top center;
    border:3px solid #222;
}

.left-arm{
    left:10px;
    animation:armLeft 0.6s infinite alternate;
}

.right-arm{
    right:10px;
    animation:armRight 0.6s infinite alternate;
}

/* Legs */
.leg{
    position:absolute;
    width:22px;
    height:95px;
    background:#2244ff;
    top:150px;
    border-radius:20px;
    transform-origin:top center;
    border:3px solid #222;
}

.left-leg{
    left:40px;
    animation:legLeft 0.6s infinite alternate;
}

.right-leg{
    right:40px;
    animation:legRight 0.6s infinite alternate;
}

/* Animations */

@keyframes moveCharacter{
    from{
        left:-200px;
    }
    to{
        left:110%;
    }
}

@keyframes bounce{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(-8px);
    }
}

@keyframes armLeft{
    from{
        transform:rotate(35deg);
    }
    to{
        transform:rotate(-35deg);
    }
}

@keyframes armRight{
    from{
        transform:rotate(-35deg);
    }
    to{
        transform:rotate(35deg);
    }
}

@keyframes legLeft{
    from{
        transform:rotate(-30deg);
    }
    to{
        transform:rotate(30deg);
    }
}

@keyframes legRight{
    from{
        transform:rotate(30deg);
    }
    to{
        transform:rotate(-30deg);
    }
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="background">

    <div class="character">
        <div class="character-inner">

            <div class="head"></div>

            <div class="body"></div>

            <div class="arm left-arm"></div>
            <div class="arm right-arm"></div>

            <div class="leg left-leg"></div>
            <div class="leg right-leg"></div>

        </div>
    </div>

    <div class="ground"></div>

</div>

<!-- LANDING PAGE CONTENT -->
<div class="content">

    <h1>WELCOME</h1>

    <p>SHOW ME YOUR SOLVING SKILL</p>

    <a href="f:\My project (1)\Baldex.html">
    <button class="btn">GET STARTED</button>
    </a>

</div>

</body>
</html>
